# Release workflow.
#
# Triggered by tags matching `v*`. Builds cross-platform binaries via
# `cargo-dist`, attaches them to a GitHub Release, and (when secrets are
# configured) updates a Homebrew tap.
#
# To cut a release:
#   1. Bump `[workspace.package].version` in `Cargo.toml`.
#   2. Update `CHANGELOG.md` — move "[Unreleased]" entries under the new
#      `[X.Y.Z]` heading.
#   3. Commit, then `git tag vX.Y.Z && git push --tags`.
#   4. This workflow runs and produces the release.
#
# First-time setup also requires running `cargo dist init` once locally
# to confirm the `[workspace.metadata.dist]` block in `Cargo.toml`. The
# workflow is regenerated by `cargo dist generate` and committed.

name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────── plan ───────────────────────────
  # Runs once to compute the matrix of targets cargo-dist will build.
  plan:
    runs-on: ubuntu-latest
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ !github.event.pull_request && github.ref_name || '' }}
      tag-flag: ${{ !github.event.pull_request && format('--tag={0}', github.ref_name) || '--no-local-paths' }}
      publishing: ${{ !github.event.pull_request }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Install cargo-dist
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.22.1/cargo-dist-installer.sh | sh
      - id: plan
        run: |
          cargo dist plan ${{ !github.event.pull_request && format('--tag={0}', github.ref_name) || '--no-local-paths' }} --output-format=json > plan-dist-manifest.json
          echo "manifest<<EOF" >> $GITHUB_OUTPUT
          cat plan-dist-manifest.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: "Upload plan"
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-plan-dist-manifest
          path: plan-dist-manifest.json

  # ─────────────────────── build per target ─────────────────────
  build:
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-13
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-dist
        shell: bash
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.22.1/cargo-dist-installer.sh | sh || powershell -c "irm https://github.com/axodotdev/cargo-dist/releases/download/v0.22.1/cargo-dist-installer.ps1 | iex"
      - name: Build
        run: cargo dist build ${{ needs.plan.outputs.tag-flag }} --print=linkage --output-format=json --artifacts=local --target=${{ matrix.target }}

  # ─────────────────────── publish + release ────────────────────
  publish:
    needs: [plan, build]
    if: needs.plan.outputs.publishing == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Install cargo-dist
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.22.1/cargo-dist-installer.sh | sh
      # NOTE: the actual `cargo dist generate-ci` workflow is more elaborate.
      # This stub gets a release+binaries; the Homebrew step needs a tap repo
      # and HOMEBREW_TAP_TOKEN to be configured. Until then it skips silently.
      - name: Build & upload artifacts to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo dist build ${{ needs.plan.outputs.tag-flag }} --output-format=json --artifacts=all
